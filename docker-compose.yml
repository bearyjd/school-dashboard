services:
  dashboard:
    image: ghcr.io/bearyjd/school-dashboard:latest
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./state:/app/state
      - ./web:/app/web
      - ./config/env:/app/config/env:ro
      # gog OAuth credentials (set up once with: gog auth add ...)
      - /root/.config/gogcli:/root/.config/gogcli
      # IXL session cache
      - /root/.ixl:/root/.ixl
      # Schoology session cache
      - /root/.sgy:/root/.sgy
    env_file:
      - config/env
    environment:
      - TZ=America/New_York
      - SCHOOL_STATE_PATH=/app/state/school-state.json
      - SCHOOL_DB_PATH=/app/state/school.db
      - SCHOOL_FACTS_PATH=/app/state/facts.json
      - SCHOOL_EMAIL_DIGEST=/app/state/email-digest.json
      - SCHOOL_CALENDAR_PDF=/app/state/calendar.pdf
      - SCHOOL_DASHBOARD_HTML=/app/state/school-dashboard.html
