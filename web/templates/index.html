<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>School Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;background:#0f1117;color:#f0f2fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:22px}
body{display:flex;flex-direction:column;height:100vh}
.tabbar{display:flex;background:#1a1d27;border-bottom:2px solid #252938;flex-shrink:0}
.tabbar button{flex:1;background:none;border:0;color:#b0bace;padding:14px 8px;font-size:20px;font-weight:600;cursor:pointer;transition:color .15s}
.tabbar button.active{color:#4f8ef7;border-bottom:2px solid #4f8ef7;margin-bottom:-2px}
.tab-panel{flex:1;display:none;overflow:hidden;flex-direction:column;min-height:0}
.tab-panel.active{display:flex}
#dashboard-frame{flex:1;width:100%;border:0;background:#0f1117}
#chat-panel{background:#0f1117}
#messages{flex:1;overflow-y:auto;padding:16px 12px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch;min-height:0}
.msg{max-width:82%;padding:10px 14px;border-radius:18px;font-size:20px;line-height:1.5;word-wrap:break-word}
.msg.user{align-self:flex-end;background:#4f8ef7;color:#fff;border-bottom-right-radius:4px;white-space:pre-wrap}
.msg.bot{align-self:flex-start;background:#1a1d27;color:#f0f2fa;border:1px solid #252938;border-bottom-left-radius:4px}
.msg.bot.loading{color:#b0bace;font-style:italic;white-space:pre-wrap}
.msg.error{background:#3a1a1f;border-color:#5a2a2f;color:#ff9aa2}
/* ── Dashboard tab ── */
.dtab{padding:6px 14px;border:0;border-radius:8px;font-size:18px;font-weight:600;cursor:pointer;background:#1a1d27;color:#b0bace;transition:background .15s,color .15s}
.dtab.active{background:#4f8ef7;color:#fff}
.dtab:hover:not(.active){background:#252938;color:#f0f2fa}
.dchip{padding:5px 12px;border:0;border-radius:8px;font-size:17px;font-weight:600;cursor:pointer;background:#1a1d27;color:#b0bace;transition:background .15s,color .15s}
.dchip.active{background:#252938;color:#f0f2fa;border:1px solid #3a3d4e}
.dchip:not(.active){border:1px solid transparent}
.dchip:hover:not(.active){background:#1e2130}
.dash-section{padding:8px 14px 4px;font-size:13px;font-weight:700;color:#b8c0d8;text-transform:uppercase;letter-spacing:.06em}
.dash-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-bottom:1px solid #1a1d27;transition:background .1s}
.dash-check{appearance:none;-webkit-appearance:none;width:18px;height:18px;min-width:18px;border:2px solid #4a4d5e;border-radius:4px;background:none;cursor:pointer;margin-top:2px;transition:all .15s}
.dash-check:checked{background:#3b82f6;border-color:#3b82f6}
.dash-check:checked::after{content:'✓';color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
.dash-done .dash-summary{text-decoration:line-through;color:#5a5d6e}
.dash-done .dash-meta{opacity:.4}
.dash-done .dash-dot{opacity:.3}
.dash-item:hover{background:#13151f}
.dash-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}
.dash-body{flex:1;min-width:0}
.dash-summary{font-size:24px;color:#f0f2fa;line-height:1.4}
.dash-meta{font-size:17px;color:#b8c0d8;margin-top:2px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.dash-child{font-size:13px;font-weight:600;background:#1e2130;color:#a5adc6;padding:2px 6px;border-radius:4px}
.dash-due{font-size:15px;font-weight:500}
.due-overdue{color:#ef4444}
.due-today{color:#f59e0b}
.due-soon{color:#3b82f6}
.due-later{color:#b8c0d8}
.dash-source{font-size:13px;background:#1a1d27;color:#b8c0d8;padding:1px 5px;border-radius:3px}
.dash-empty{color:#b8c0d8;text-align:center;padding:48px 20px;font-size:16px}
.dash-item-link{display:block;text-decoration:none;color:inherit}
/* ── Actions tab ── */
#manage-panel{background:#0f1117;flex-direction:column;overflow-y:auto}
.actions-section-hdr{display:flex;align-items:center;padding:10px 14px;font-size:14px;font-weight:700;color:#b8c0d8;text-transform:uppercase;letter-spacing:.07em;background:#12141e;border-bottom:1px solid #1e2130;flex-shrink:0}
.actions-section-hdr .add-btn{margin-left:auto}
.email-action-item{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid #1a1d27;transition:background .1s}
.email-action-item:hover{background:#13151f}
.ea-body{flex:1;min-width:0}
.ea-summary{font-size:24px;color:#f0f2fa;line-height:1.4}
.ea-meta{font-size:15px;color:#b8c0d8;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.ea-link{color:#4f8ef7;text-decoration:none;font-size:15px;font-weight:600;white-space:nowrap}
.ea-link:hover{text-decoration:underline}
.subtab-bar{display:flex;gap:6px;padding:10px 12px;background:#12141e;border-bottom:1px solid #1e2130;flex-wrap:wrap;align-items:center;flex-shrink:0}
.subtab{padding:6px 14px;border:0;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;background:#1a1d27;color:#b0bace;transition:background .15s,color .15s}
.subtab.active,.subtab:hover{background:#4f8ef7;color:#fff}
.add-btn{margin-left:auto;padding:6px 14px;background:#1a2a1a;color:#4ade80;border:1px solid #2a3a2a;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-btn:hover{background:#1e341e}
#add-form{display:none;flex-direction:column;gap:0;background:#13151f;border-bottom:2px solid #1e2130;flex-shrink:0}
.form-header{padding:12px 16px 0;font-size:14px;font-weight:700;color:#b0bace;text-transform:uppercase;letter-spacing:.06em}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px}
.form-grid .full{grid-column:1/-1}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-field label{font-size:13px;font-weight:600;color:#b8c0d8;text-transform:uppercase;letter-spacing:.05em}
.form-field input,.form-field select{background:#0f1117;color:#f0f2fa;border:1px solid #252938;border-radius:8px;padding:8px 11px;font-size:16px;font-family:inherit;outline:none}
.form-field input:focus,.form-field select:focus{border-color:#4f8ef7}
.form-actions{display:flex;gap:8px;padding:0 16px 12px}
.form-save{padding:8px 20px;background:#4f8ef7;color:#fff;border:0;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}
.form-save:hover{background:#3a7ef0}
.form-cancel{padding:8px 14px;background:#1a1d27;color:#b0bace;border:1px solid #252938;border-radius:8px;font-size:16px;cursor:pointer}
.form-cancel:hover{color:#f0f2fa}
#items-list{flex:1;overflow-y:auto;background:#0f1117;min-height:0}
.item-card{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #1a1d27;transition:background .1s}
.item-card:hover{background:#13151f}
.urgency-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.item-body{flex:1;min-width:0}
.item-title{font-size:22px;color:#f0f2fa;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.item-meta{font-size:15px;color:#b8c0d8;margin-top:2px}
.item-notes{font-size:15px;color:#b0bace;margin-top:3px}
.badge{font-size:13px;padding:2px 7px;border-radius:5px;font-weight:600}
.badge-overdue{background:#3a1a1f;color:#ef4444}
.badge-today{background:#3a2a0a;color:#f59e0b}
.badge-tomorrow{background:#1a2030;color:#3b82f6}
.badge-done{background:#1a1d27;color:#b8c0d8}
.item-actions{display:flex;gap:6px;flex-shrink:0}
.btn-done{padding:5px 11px;background:#1a2a1a;color:#4ade80;border:1px solid #2a3a2a;border-radius:6px;font-size:14px;cursor:pointer}
.btn-done:hover{background:#1e341e}
.btn-edit{padding:5px 9px;background:#1a1d27;color:#b0bace;border:1px solid #252938;border-radius:6px;font-size:14px;cursor:pointer}
.btn-edit:hover{color:#f0f2fa}
.completed-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #1a1d27;opacity:.4}
.show-completed{padding:10px 14px;font-size:14px;color:#4f8ef7;cursor:pointer;text-align:center;border-top:1px solid #1a1d27}
.show-completed:hover{text-decoration:underline}
.items-empty{color:#b8c0d8;text-align:center;padding:48px 20px;font-size:16px}
/* Markdown styles inside bot messages */
.msg.bot p{margin:0 0 8px}
.msg.bot p:last-child{margin-bottom:0}
.msg.bot h1,.msg.bot h2,.msg.bot h3{margin:10px 0 4px;color:#d8dff5;font-size:1em;font-weight:700}
.msg.bot h1{font-size:1.1em}
.msg.bot ul,.msg.bot ol{margin:4px 0 8px;padding-left:20px}
.msg.bot li{margin:2px 0}
.msg.bot strong{color:#fff;font-weight:700}
.msg.bot em{color:#adb8d4}
.msg.bot code{background:#0a0c14;border:1px solid #252938;border-radius:4px;padding:1px 5px;font-size:15px;font-family:"SFMono-Regular",Consolas,monospace;color:#7dd3fc}
.msg.bot pre{background:#0a0c14;border:1px solid #252938;border-radius:8px;padding:10px 12px;overflow-x:auto;margin:6px 0}
.msg.bot pre code{background:none;border:none;padding:0;font-size:15px;color:#7dd3fc}
.msg.bot blockquote{border-left:3px solid #4f8ef7;margin:6px 0;padding:4px 10px;color:#b0bace}
.msg.bot a{color:#4f8ef7;text-decoration:none}
.msg.bot hr{border:none;border-top:1px solid #252938;margin:8px 0}
.msg.bot table{border-collapse:collapse;width:100%;margin:6px 0;font-size:16px}
.msg.bot th,.msg.bot td{border:1px solid #252938;padding:5px 8px;text-align:left}
.msg.bot th{background:#252938;color:#d8dff5}
.input-bar{display:flex;gap:8px;padding:10px;background:#1a1d27;border-top:1px solid #252938;flex-shrink:0}
#msg-input{flex:1;background:#0f1117;color:#f0f2fa;border:1px solid #252938;border-radius:20px;padding:10px 14px;font-size:20px;resize:none;max-height:120px;font-family:inherit;outline:none}
#msg-input:focus{border-color:#4f8ef7}
#send-btn{background:#4f8ef7;color:#fff;border:0;border-radius:20px;padding:0 18px;font-size:18px;font-weight:600;cursor:pointer}
#send-btn:disabled{opacity:.5;cursor:not-allowed}
.qchip{background:#1e2130;color:#a5adc6;border:1px solid #252938;border-radius:16px;padding:5px 12px;font-size:16px;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.qchip:hover{background:#252938;color:#f0f2fa}
.empty-hint{color:#b8c0d8;text-align:center;font-size:16px;padding:40px 20px;margin:auto}
/* --- Carousel mode --- */
.carousel-overlay{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:9999;
  background:#f5f5f5;display:flex;flex-direction:column;}
.carousel-progress{height:4px;background:#e0e0e0;flex-shrink:0;}
.carousel-progress-fill{height:100%;background:#4caf50;transition:width .3s;}
.carousel-header{display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;flex-shrink:0;}
.carousel-header .progress-text{font-size:14px;color:#666;}
.carousel-header .carousel-close{background:none;border:none;font-size:24px;cursor:pointer;
  color:#666;padding:4px 8px;}
.carousel-track{flex:1;display:flex;overflow-x:scroll;scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;scroll-behavior:smooth;}
.carousel-track::-webkit-scrollbar{display:none;}
.carousel-card{min-width:100vw;scroll-snap-align:start;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px 20px;box-sizing:border-box;}
.carousel-card-inner{background:#fff;border-radius:16px;padding:32px 24px;
  max-width:400px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.1);
  display:flex;flex-direction:column;align-items:center;text-align:center;gap:16px;}
.carousel-badge{display:inline-block;padding:4px 12px;border-radius:12px;
  font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
.carousel-badge.schoology{background:#e3f2fd;color:#1565c0;}
.carousel-badge.ixl{background:#e8f5e9;color:#2e7d32;}
.carousel-badge.email{background:#fff3e0;color:#e65100;}
.carousel-badge.calendar{background:#f3e5f5;color:#7b1fa2;}
.carousel-badge.readiness{background:#fce4ec;color:#c62828;}
.carousel-child{font-size:14px;color:#888;font-weight:500;}
.carousel-title{font-size:22px;font-weight:700;color:#222;line-height:1.3;}
.carousel-detail{font-size:15px;color:#666;}
.carousel-due{font-size:13px;color:#999;}
.carousel-link{font-size:13px;color:#1976d2;text-decoration:none;}
.carousel-link:hover{text-decoration:underline;}
.carousel-check{width:56px;height:56px;border-radius:50%;border:3px solid #ccc;
  background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:28px;color:transparent;transition:all .2s;}
.carousel-check.done{border-color:#4caf50;background:#4caf50;color:#fff;}
.carousel-card-inner.done{opacity:.5;}
.carousel-card-inner.done .carousel-title{text-decoration:line-through;}
.carousel-dots{display:flex;justify-content:center;gap:6px;padding:12px;flex-shrink:0;}
.carousel-dot{width:8px;height:8px;border-radius:50%;background:#ccc;transition:background .2s;}
.carousel-dot.active{background:#333;}
.carousel-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.1);
  border:none;border-radius:50%;width:40px;height:40px;cursor:pointer;font-size:20px;
  display:none;align-items:center;justify-content:center;}
@media(min-width:768px){.carousel-nav{display:flex;}}
.carousel-nav.prev{left:12px;}
.carousel-nav.next{right:12px;}
.carousel-footer{text-align:center;padding:8px 16px 20px;flex-shrink:0;}
.carousel-footer a{color:#1976d2;font-size:14px;text-decoration:none;}
.carousel-alldone{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:16px;padding:40px;text-align:center;}
.carousel-alldone .checkmark{font-size:64px;color:#4caf50;}
.carousel-alldone h2{font-size:24px;color:#333;}
</style>
</head>
<body>
<nav class="tabbar">
  <button data-tab="dashboard" class="active">&#128202; Dashboard</button>
  <button data-tab="manage">&#9989; Actions</button>
  <button data-tab="chat">&#128172; Chat</button>
</nav>
<div class="tab-panel active" id="dashboard-panel">
  <div style="display:flex;flex-direction:column;flex-shrink:0">
    <div id="dash-mode-bar" style="display:flex;gap:6px;padding:10px 12px;background:#12141e;border-bottom:1px solid #1e2130;flex-wrap:wrap;align-items:center">
      <button class="dtab active" data-mode="schoology">Schoology</button>
      <button class="dtab" data-mode="ixl">IXL</button>
      <button class="dtab" data-mode="email">Email Items</button>
      <button class="dtab" data-mode="calendar">Calendar</button>
      <button class="dtab" data-mode="readiness">Readiness</button>
      <button class="dtab" data-mode="all">All</button>
      <a href="/dashboard-frame" target="_blank" style="margin-left:auto;font-size:20px;color:#b8c0d8;text-decoration:none">Full Report ↗</a>
    </div>
    <div id="dash-child-bar" style="display:flex;gap:6px;padding:8px 12px;background:#0f1117;border-bottom:1px solid #1e2130;flex-wrap:wrap"></div>
    <div id="dash-time-bar" style="display:none;gap:6px;padding:6px 12px;background:#0f1117;border-bottom:1px solid #1e2130;flex-wrap:wrap">
      <button class="dtab active" data-time="week">This Week</button>
      <button class="dtab" data-time="today">Today</button>
      <button class="dtab" data-time="month">This Month</button>
      <button class="dtab" data-time="all">All</button>
    </div>
  </div>
  <div id="dash-list" style="flex:1;overflow-y:auto;background:#0f1117;min-height:0"></div>
</div>
<div class="tab-panel" id="manage-panel">
  <!-- Email Actions -->
  <div class="actions-section-hdr">Email Actions</div>
  <div id="email-actions-list"></div>
  <!-- Reminders -->
  <div class="actions-section-hdr" style="border-top:2px solid #1e2130">
    Reminders
    <button id="add-item-btn" class="add-btn" onclick="toggleAddForm()">+ Add</button>
  </div>
  <form id="add-form" onsubmit="submitItem(event)">
    <div class="form-header" id="form-header-label">Add Reminder</div>
    <div class="form-grid">
      <div class="form-field full">
        <label for="f-title">Title</label>
        <input id="f-title" required placeholder="e.g. Bring cleats Friday">
      </div>
      <div class="form-field">
        <label for="f-child">Child</label>
        <input id="f-child" required list="children-list" placeholder="Child name" autocomplete="off">
        <datalist id="children-list"></datalist>
      </div>
      <div class="form-field">
        <label for="f-type">Type</label>
        <select id="f-type">
          <option value="assignment">Assignment</option>
          <option value="extracurricular">Extracurricular</option>
          <option value="event">Event</option>
        </select>
      </div>
      <div class="form-field">
        <label for="f-due">Due date</label>
        <input id="f-due" type="date">
      </div>
      <div class="form-field">
        <label for="f-notes">Notes</label>
        <input id="f-notes" placeholder="Optional">
      </div>
    </div>
    <input id="f-editing-id" type="hidden" value="">
    <div class="form-actions">
      <button type="submit" class="form-save">Save</button>
      <button type="button" class="form-cancel" onclick="cancelAddForm()">Cancel</button>
    </div>
  </form>
  <div id="items-list"></div>
</div>
<div class="tab-panel" id="chat-panel">
  <div id="messages">
    <div class="empty-hint">Ask about grades, assignments, or emails.<br><br>Example: "What's due this week?" or "Any no-school days coming up?"</div>
  </div>
  <div id="quick-queries" style="display:flex;gap:6px;padding:8px 10px 0;flex-wrap:wrap;background:#1a1d27;border-top:1px solid #252938">
    <button class="qchip" onclick="quickSend('What needs my attention today?')">What needs my attention today?</button>
    <button class="qchip" onclick="quickSend('What\'s due this week?')">What\'s due this week?</button>
    <button class="qchip" onclick="quickSend('How are the kids doing in IXL?')">How are the kids doing in IXL?</button>
    <button class="qchip" onclick="quickSend('What IXL assignments are due or overdue for each kid?')">IXL due dates</button>
    <button class="qchip" onclick="quickSend('Show me each kid\'s current Schoology homework and assignments.')">Schoology homework</button>
  </div>
  <div class="input-bar">
    <textarea id="msg-input" rows="1" placeholder="Ask about the kids..."></textarea>
    <button id="send-btn">Send</button>
  </div>
</div>
<script>
marked.setOptions({breaks:true,gfm:true});
const tabs=document.querySelectorAll(".tabbar button");
const panels={dashboard:document.getElementById("dashboard-panel"),manage:document.getElementById("manage-panel"),chat:document.getElementById("chat-panel")};
tabs.forEach(t=>t.addEventListener("click",()=>{
  tabs.forEach(x=>x.classList.remove("active"));
  t.classList.add("active");
  Object.values(panels).forEach(p=>p.classList.remove("active"));
  panels[t.dataset.tab].classList.add("active");
  if(t.dataset.tab==="chat")setTimeout(()=>msgInput.focus(),50);
  if(t.dataset.tab==="manage"){renderEmailActions();loadItems();}
}));
const messages=document.getElementById("messages");
const msgInput=document.getElementById("msg-input");
const sendBtn=document.getElementById("send-btn");
const history=[];
function scrollBottom(){messages.scrollTop=messages.scrollHeight}
function addMsg(role,text,cls){
  const hint=messages.querySelector(".empty-hint");if(hint)hint.remove();
  const el=document.createElement("div");
  el.className="msg "+(role==="user"?"user":"bot")+(cls?" "+cls:"");
  if(role==="user"||cls==="loading"||cls==="error"){
    el.textContent=text;
  }else{
    el.innerHTML=marked.parse(text);
  }
  messages.appendChild(el);scrollBottom();return el;
}
async function send(){
  const text=msgInput.value.trim();if(!text)return;
  msgInput.value="";msgInput.style.height="auto";sendBtn.disabled=true;
  addMsg("user",text);history.push({role:"user",content:text});
  const loading=addMsg("bot","Thinking...","loading");
  try{
    const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:text,history:history.slice(0,-1)})});
    const data=await r.json();
    loading.remove();
    if(data.error){addMsg("bot","Error: "+data.error,"error");}
    else{addMsg("bot",data.reply);history.push({role:"assistant",content:data.reply});}
  }catch(e){loading.remove();addMsg("bot","Network error: "+e.message,"error");}
  sendBtn.disabled=false;msgInput.focus();
}
function quickSend(text){msgInput.value=text;send();}
sendBtn.addEventListener("click",send);
msgInput.addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
msgInput.addEventListener("input",()=>{msgInput.style.height="auto";msgInput.style.height=Math.min(msgInput.scrollHeight,120)+"px";});
// ── Dashboard tab ───────────────────────────────────────────
let dashData={schoology:{},ixl:{},email_items:[]};
let dashMode='schoology';
let dashChild='all';
let dashTime='week';

function dashDiff(iso){
  if(!iso)return null;
  const d=new Date(iso+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}
function dashDot(diff){
  if(diff===null)return '#3a3d4e';
  if(diff<0)return '#ef4444';
  if(diff===0)return '#f59e0b';
  if(diff<=7)return '#3b82f6';
  return '#3a3d4e';
}
function dashDueLabel(iso){
  const diff=dashDiff(iso);
  if(diff===null)return '';
  if(diff<0)return '<span class="dash-due due-overdue">Overdue</span>';
  if(diff===0)return '<span class="dash-due due-today">Today</span>';
  if(diff===1)return '<span class="dash-due due-soon">Tomorrow</span>';
  if(diff<=7)return '<span class="dash-due due-soon">'+iso+'</span>';
  return '<span class="dash-due due-later">'+iso+'</span>';
}

function dashAllChildren(){
  const s=Object.keys(dashData.schoology);
  const i=Object.keys(dashData.ixl);
  return [...new Set([...s,...i])].sort();
}

function renderDashChildBar(){
  const children=dashAllChildren();
  const bar=document.getElementById('dash-child-bar');
  bar.innerHTML=['all',...children].map(c=>
    '<button class="dchip'+(dashChild===c?' active':'')+'" onclick="setDashChild(\''+escHtml(c)+'\')">'+escHtml(c==='all'?'All':c)+'</button>'
  ).join('');
}

function renderSchoology(){
  if(!dashData.schoology)return '<div class="dash-empty">No Schoology data available.</div>';
  let items=[];
  for(const [child,asgns] of Object.entries(dashData.schoology)){
    if(!asgns)continue;
    asgns.forEach(a=>items.push(Object.assign({},a,{_child:child})));
  }
  if(dashChild!=='all') items=items.filter(i=>i._child===dashChild);
  if(dashTime==='today') items=items.filter(i=>{const d=dashDiff(i.due_date);return d===null||d<=0;});
  else if(dashTime==='week') items=items.filter(i=>{const d=dashDiff(i.due_date);return d===null||d<=7;});
  else if(dashTime==='month') items=items.filter(i=>{const d=dashDiff(i.due_date);return d===null||d<=31;});
  items=items.slice().sort((a,b)=>{
    const da=dashDiff(a.due_date),db=dashDiff(b.due_date);
    if(da===null&&db===null)return 0;
    if(da===null)return 1;if(db===null)return -1;
    return da-db;
  });
  if(!items.length)return '<div class="dash-empty">No Schoology assignments for this filter.</div>';
  items.forEach(i=>i._done=isDone('Schoology',i._child,i.title));
  const active=items.filter(i=>!i._done), done=items.filter(i=>i._done);
  return [...active,...done].map(i=>{
    const diff=dashDiff(i.due_date);
    const ck=i._done?'checked':'';
    const cls=i._done?' dash-done':'';
    const cb='<input type="checkbox" class="dash-check" '+ck+' onclick="event.preventDefault();event.stopPropagation();toggleDone(\'Schoology\',\''+escHtml(i._child)+'\',\''+escHtml(i.title).replace(/'/g,"\\'")+'\')"/>';
    const inner=cb+
      '<span class="dash-dot" style="background:'+dashDot(diff)+'"></span>'+
      '<div class="dash-body">'+
        '<div class="dash-summary">'+escHtml(i.title)+'</div>'+
        '<div class="dash-meta">'+
          (i.course?'<span class="dash-source">'+escHtml(i.course)+'</span>':'')+
          dashDueLabel(i.due_date)+
        '</div>'+
      '</div>';
    return i.url
      ?'<a class="dash-item dash-item-link'+cls+'" href="'+escHtml(i.url)+'" target="_blank" rel="noopener">'+inner+'</a>'
      :'<div class="dash-item'+cls+'">'+inner+'</div>';
  }).join('');
}

function renderIxl(){
  const data=dashChild==='all'?dashData.ixl:{[dashChild]:dashData.ixl[dashChild]||[]};
  let html='';
  for(const [child,subjects] of Object.entries(data)){
    if(!subjects||!subjects.length)continue;
    html+='<div class="dash-section">'+escHtml(child)+'</div>';
    html+=subjects.map(s=>{
      return '<a class="dash-item dash-item-link" href="https://www.ixl.com/" target="_blank" rel="noopener">'+
        '<span class="dash-dot" style="background:'+(s.remaining>10?'#ef4444':s.remaining>3?'#f59e0b':'#3b82f6')+'"></span>'+
        '<div class="dash-body">'+
          '<div class="dash-summary">'+escHtml(s.subject)+'</div>'+
          '<div class="dash-meta"><span class="dash-source">'+s.remaining+' remaining · '+s.done+'/'+s.assigned+' done</span></div>'+
        '</div></a>';
    }).join('');
  }
  return html||'<div class="dash-empty">No IXL work remaining.</div>';
}

let readinessData=null;
async function loadReadiness(){
  if(readinessData!==null)return;
  try{
    const r=await fetch('/api/readiness');
    const d=await r.json();
    readinessData=d.checklist||{};
  }catch(e){readinessData={};}
}

function renderReadiness(){
  const list=document.getElementById('dash-list');
  if(readinessData===null){list.innerHTML='<div class="dash-empty">Loading...</div>';return;}
  let items=[];
  Object.entries(readinessData).forEach(([child,childItems])=>{
    childItems.forEach(item=>items.push(Object.assign({},item,{child})));
  });
  if(dashChild!=='all') items=items.filter(i=>i.child===dashChild);
  if(!items.length){list.innerHTML='<div class="dash-empty">All clear - nothing urgent!</div>';return;}
  const urgencyOrder={overdue:0,tomorrow:1,soon:2,pending:3};
  items.sort((a,b)=>(urgencyOrder[a.urgency]??3)-(urgencyOrder[b.urgency]??3));
  const urgencyColor={overdue:'#ff9aa2',tomorrow:'#ffd180',soon:'#b5ead7',pending:'#c7ceea'};
  list.innerHTML=items.map(item=>{
    const color=urgencyColor[item.urgency]||'#c7ceea';
    return '<div class="dash-item">'+
      '<span class="dash-dot" style="background:'+color+'"></span>'+
      '<div class="dash-body">'+
        '<div class="dash-summary">'+escHtml(item.label)+'</div>'+
        '<div class="dash-meta">'+
          '<span class="dash-child">'+escHtml(item.child)+'</span>'+
          (item.detail?'<span class="dash-source">'+escHtml(item.detail)+'</span>':'')+
        '</div>'+
      '</div></div>';
  }).join('');
}

let calEvents=[];
async function loadCalendar(){
  if(calEvents.length)return;
  try{
    const r=await fetch('/api/calendar');
    const d=await r.json();
    calEvents=d.events||[];
  }catch(e){calEvents=[];}
}

function renderCalendar(){
  if(!calEvents.length)return '<div class="dash-empty">Loading calendar...</div>';
  const today=new Date();today.setHours(0,0,0,0);
  return calEvents.map(e=>{
    const start=e.start?e.start.slice(0,10):'';
    const diff=start?Math.round((new Date(start+e.all_day?'T12:00:00':'').getTime()-today.getTime())/86400000):null;
    const inner='<span class="dash-dot" style="background:'+dashDot(diff)+'"></span>'+
      '<div class="dash-body">'+
        '<div class="dash-summary">'+escHtml(e.title)+'</div>'+
        '<div class="dash-meta">'+
          dashDueLabel(start)+
          (e.location?'<span class="dash-source">'+escHtml(e.location)+'</span>':'')+
        '</div>'+
      '</div>';
    return e.url
      ?'<a class="dash-item dash-item-link" href="'+escHtml(e.url)+'" target="_blank" rel="noopener">'+inner+'</a>'
      :'<div class="dash-item">'+inner+'</div>';
  }).join('');
}

function renderEmailItems(){
  let items=dashData.email_items;
  if(dashChild!=='all') items=items.filter(i=>i.child===dashChild);
  if(dashTime==='today') items=items.filter(i=>{const d=dashDiff(i.due_iso);return d!==null&&d<=0;});
  else if(dashTime==='week') items=items.filter(i=>{const d=dashDiff(i.due_iso);return d!==null&&d<=7;});
  else if(dashTime==='month') items=items.filter(i=>{const d=dashDiff(i.due_iso);return d!==null&&d<=31;});
  items=items.slice().sort((a,b)=>{
    const da=dashDiff(a.due_iso),db=dashDiff(b.due_iso);
    if(da===null&&db===null)return 0;
    if(da===null)return 1;if(db===null)return -1;
    return da-db;
  });
  if(!items.length)return '<div class="dash-empty">No email items for this filter.</div>';
  return items.map(i=>{
    const diff=dashDiff(i.due_iso);
    return '<div class="dash-item">'+
      '<span class="dash-dot" style="background:'+dashDot(diff)+'"></span>'+
      '<div class="dash-body">'+
        '<div class="dash-summary">'+escHtml(i.summary)+'</div>'+
        '<div class="dash-meta">'+
          '<span class="dash-child">'+escHtml(i.child)+'</span>'+
          dashDueLabel(i.due_iso)+
        '</div>'+
      '</div></div>';
  }).join('');
}

function renderAll(){
  let items=[];
  // Schoology assignments
  for(const [child,asgns] of Object.entries(dashData.schoology||{})){
    if(!asgns)continue;
    asgns.forEach(a=>items.push({title:a.title,child:child,due:a.due_date||'',src:'Schoology',detail:a.course||'',url:a.url||''}));
  }
  // IXL remaining work
  for(const [child,subjects] of Object.entries(dashData.ixl||{})){
    if(!subjects)continue;
    subjects.forEach(s=>items.push({title:s.subject,child:child,due:'',src:'IXL',detail:s.remaining+' remaining · '+s.done+'/'+s.assigned+' done',url:'https://www.ixl.com/'}));
  }
  // Email action items
  (dashData.email_items||[]).forEach(i=>items.push({title:i.summary,child:i.child||'',due:i.due_iso||'',src:'Email',detail:'',url:i.id?'https://mail.google.com/mail/u/0/#all/'+encodeURIComponent(i.id):''}));
  // Calendar events (if loaded)
  calEvents.forEach(e=>{const start=e.start?e.start.slice(0,10):'';items.push({title:e.title,child:'',due:start,src:'Calendar',detail:e.location||'',url:e.url||''});});
  // Readiness items (if loaded)
  if(readinessData){Object.entries(readinessData).forEach(([child,cItems])=>{(cItems||[]).forEach(r=>items.push({title:r.label,child:child,due:'',src:'Readiness',detail:r.detail||r.urgency||'',url:''}));});}
  // Filter by child
  if(dashChild!=='all') items=items.filter(i=>i.child===dashChild);
  // Filter by time
  if(dashTime==='today') items=items.filter(i=>{const d=dashDiff(i.due);return d===null||d<=0;});
  else if(dashTime==='week') items=items.filter(i=>{const d=dashDiff(i.due);return d===null||d<=7;});
  else if(dashTime==='month') items=items.filter(i=>{const d=dashDiff(i.due);return d===null||d<=31;});
  // Sort: dated items first (ascending), then undated
  items.sort((a,b)=>{
    const da=dashDiff(a.due),db=dashDiff(b.due);
    if(da===null&&db===null)return 0;
    if(da===null)return 1;if(db===null)return -1;
    return da-db;
  });
  if(!items.length)return '<div class="dash-empty">No items for this filter.</div>';
  const srcColor={Schoology:'#6366f1',IXL:'#f59e0b',Email:'#3b82f6',Calendar:'#10b981',Readiness:'#ec4899'};
  // Sort done items to bottom
  items.forEach(i=>i._done=isDone(i.src,i.child,i.title));
  const active=items.filter(i=>!i._done), done=items.filter(i=>i._done);
  const all=[...active,...done];
  return all.map(i=>{
    const diff=dashDiff(i.due);
    const ck=i._done?'checked':'';
    const cls=i._done?' dash-done':'';
    const cb='<input type="checkbox" class="dash-check" '+ck+' onclick="event.preventDefault();event.stopPropagation();toggleDone(\''+escHtml(i.src)+'\',\''+escHtml(i.child)+'\',\''+escHtml(i.title).replace(/'/g,"\\'")+'\')"/>';
    const inner=cb+
      '<span class="dash-dot" style="background:'+dashDot(diff)+'"></span>'+
      '<div class="dash-body">'+
        '<div class="dash-summary">'+escHtml(i.title)+'</div>'+
        '<div class="dash-meta">'+
          '<span style="color:'+(srcColor[i.src]||'#b0bace')+';font-weight:600;font-size:11px">'+i.src+'</span>'+
          (i.child?'<span class="dash-child">'+escHtml(i.child)+'</span>':'')+
          (i.detail?'<span class="dash-source">'+escHtml(i.detail)+'</span>':'')+
          dashDueLabel(i.due)+
        '</div>'+
      '</div>';
    return i.url
      ?'<a class="dash-item dash-item-link'+cls+'" href="'+escHtml(i.url)+'" target="_blank" rel="noopener">'+inner+'</a>'
      :'<div class="dash-item'+cls+'">'+inner+'</div>';
  }).join('');
}

function renderDashList(){
  const list=document.getElementById('dash-list');
  const timeBar=document.getElementById('dash-time-bar');
  timeBar.style.display=(dashMode==='all'||dashMode==='email'||dashMode==='schoology')?'flex':'none';
  if(dashMode==='all') list.innerHTML=renderAll();
  else if(dashMode==='schoology') list.innerHTML=renderSchoology();
  else if(dashMode==='ixl') list.innerHTML=renderIxl();
  else if(dashMode==='calendar') list.innerHTML=renderCalendar();
  else if(dashMode==='readiness') renderReadiness();
  else list.innerHTML=renderEmailItems();
}

async function loadDashboard(){
  const list=document.getElementById('dash-list');
  list.innerHTML='<div class="dash-empty">Loading...</div>';
  try{
    const r=await fetch('/api/dashboard');
    const d=await r.json();
    if(d.error){list.innerHTML='<div class="dash-empty" style="color:#ff9aa2">'+escHtml(d.error)+'</div>';return;}
    dashData=d;
    renderDashChildBar();
    renderDashList();
  }catch(e){
    list.innerHTML='<div class="dash-empty" style="color:#ff9aa2">Failed to load: '+escHtml(e.message)+'</div>';
  }
}

function setDashMode(m){
  dashMode=m;
  document.querySelectorAll('#dash-mode-bar .dtab').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));
  if(m==='all'){document.getElementById('dash-list').innerHTML='<div class="dash-empty">Loading all sources...</div>';Promise.all([loadCalendar(),loadReadiness()]).then(()=>renderDashList());}
  else if(m==='calendar'){loadCalendar().then(()=>renderDashList());}
  else if(m==='readiness'){loadReadiness().then(()=>renderDashList());}
  else renderDashList();
}
function setDashTime(t){
  dashTime=t;
  document.querySelectorAll('#dash-time-bar .dtab').forEach(b=>b.classList.toggle('active',b.dataset.time===t));
  renderDashList();
}
function setDashChild(c){
  dashChild=c;
  renderDashChildBar();
  renderDashList();
}

document.querySelectorAll('#dash-mode-bar .dtab').forEach(b=>b.addEventListener('click',()=>setDashMode(b.dataset.mode)));
document.querySelectorAll('#dash-time-bar .dtab').forEach(b=>b.addEventListener('click',()=>setDashTime(b.dataset.time)));
document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.addEventListener('click',()=>{if(btn.dataset.tab==='dashboard')loadDashboard();});
});
// --- Carousel mode ---
let _carouselDigest = null;

function initCarousel(digestId) {
  fetch('/api/digest/' + digestId)
    .then(r => { if (!r.ok) throw new Error('not found'); return r.json(); })
    .then(data => {
      _carouselDigest = data;
      renderCarousel();
    })
    .catch(() => {
      console.warn('Digest not found, showing normal dashboard');
    });
}

function renderCarousel() {
  const d = _carouselDigest;
  if (!d || !d.cards || d.cards.length === 0) return;

  const overlay = document.createElement('div');
  overlay.className = 'carousel-overlay';
  overlay.id = 'carousel-overlay';

  const doneCount = d.cards.filter(c => c.done).length;
  const total = d.cards.length;
  const pct = Math.round((doneCount / total) * 100);

  let html = '';
  html += '<div class="carousel-progress"><div class="carousel-progress-fill" id="carousel-pbar" style="width:' + pct + '%"></div></div>';
  html += '<div class="carousel-header">';
  html += '<span class="progress-text" id="carousel-ptext">' + doneCount + ' of ' + total + ' done</span>';
  html += '<button class="carousel-close" onclick="closeCarousel()">&times;</button>';
  html += '</div>';
  html += '<div class="carousel-track" id="carousel-track" style="position:relative;">';
  d.cards.forEach(function(card, i) {
    const doneClass = card.done ? ' done' : '';
    html += '<div class="carousel-card" data-index="' + i + '">';
    html += '<div class="carousel-card-inner' + doneClass + '" id="ccard-' + i + '">';
    html += '<span class="carousel-badge ' + card.source + '">' + card.source + '</span>';
    if (card.child) html += '<span class="carousel-child">' + escapeHtml(card.child) + '</span>';
    html += '<div class="carousel-title">' + escapeHtml(card.title) + '</div>';
    if (card.detail) html += '<div class="carousel-detail">' + escapeHtml(card.detail) + '</div>';
    if (card.due_date) html += '<div class="carousel-due">Due: ' + escapeHtml(card.due_date) + '</div>';
    if (card.url) html += '<a class="carousel-link" href="' + escapeHtml(card.url) + '" target="_blank">Open &#8594;</a>';
    html += '<button class="carousel-check' + (card.done ? ' done' : '') + '" id="ccheck-' + i + '" onclick="toggleCarouselCard(' + i + ')">&#10003;</button>';
    html += '</div></div>';
  });
  html += '</div>';
  html += '<button class="carousel-nav prev" onclick="carouselPrev()">&#8249;</button>';
  html += '<button class="carousel-nav next" onclick="carouselNext()">&#8250;</button>';
  html += '<div class="carousel-dots" id="carousel-dots">';
  d.cards.forEach(function(_, i) {
    html += '<span class="carousel-dot' + (i === 0 ? ' active' : '') + '" data-i="' + i + '"></span>';
  });
  html += '</div>';
  html += '<div class="carousel-footer"><a href="/">View Full Dashboard</a></div>';

  overlay.innerHTML = html;
  document.body.appendChild(overlay);

  const track = document.getElementById('carousel-track');
  track.addEventListener('scroll', function() {
    const idx = Math.round(track.scrollLeft / track.clientWidth);
    document.querySelectorAll('.carousel-dot').forEach(function(dot, i) {
      dot.classList.toggle('active', i === idx);
    });
  });
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

function toggleCarouselCard(i) {
  const d = _carouselDigest;
  const card = d.cards[i];
  const newDone = !card.done;
  card.done = newDone;
  const inner = document.getElementById('ccard-' + i);
  const check = document.getElementById('ccheck-' + i);
  inner.classList.toggle('done', newDone);
  check.classList.toggle('done', newDone);
  updateCarouselProgress();

  fetch('/api/digest/' + d.id + '/cards/' + i, {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({done: newDone})
  });

  if (newDone) {
    setTimeout(function() {
      const nextUndone = d.cards.findIndex(function(c, j) { return j > i && !c.done; });
      if (nextUndone >= 0) carouselGoTo(nextUndone);
      else if (d.cards.every(function(c) { return c.done; })) showAllDone();
    }, 500);
  }
}

function updateCarouselProgress() {
  const d = _carouselDigest;
  const doneCount = d.cards.filter(function(c) { return c.done; }).length;
  const total = d.cards.length;
  const pct = Math.round((doneCount / total) * 100);
  const pbar = document.getElementById('carousel-pbar');
  const ptext = document.getElementById('carousel-ptext');
  if (pbar) pbar.style.width = pct + '%';
  if (ptext) ptext.textContent = doneCount + ' of ' + total + ' done';
}

function carouselGoTo(i) {
  const track = document.getElementById('carousel-track');
  if (track) track.scrollTo({left: i * track.clientWidth, behavior: 'smooth'});
}

function carouselPrev() {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const idx = Math.round(track.scrollLeft / track.clientWidth);
  if (idx > 0) carouselGoTo(idx - 1);
}

function carouselNext() {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const idx = Math.round(track.scrollLeft / track.clientWidth);
  if (idx < _carouselDigest.cards.length - 1) carouselGoTo(idx + 1);
}

function closeCarousel() {
  const overlay = document.getElementById('carousel-overlay');
  if (overlay) overlay.remove();
  history.replaceState(null, '', '/');
}

function showAllDone() {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const card = document.createElement('div');
  card.className = 'carousel-card';
  card.innerHTML = '<div class="carousel-alldone">' +
    '<div class="checkmark">&#10003;</div>' +
    '<h2>All caught up!</h2>' +
    '<a href="/" style="color:#1976d2;font-size:16px;">View Full Dashboard</a>' +
    '</div>';
  track.appendChild(card);
  setTimeout(function() { carouselGoTo(_carouselDigest.cards.length); }, 300);
}

// ── Manage tab ──────────────────────────────────────────────
let mgActiveChild='all';
let mgAllItems=[];
let mgShowCompleted=false;

function urgencyDot(due){
  if(!due)return '<span class="urgency-dot" style="background:#3a3d4e"></span>';
  const diff=dueDiff(due);
  if(diff<0)return '<span class="urgency-dot" style="background:#ef4444" title="Overdue"></span>';
  if(diff===0)return '<span class="urgency-dot" style="background:#f59e0b" title="Today"></span>';
  if(diff<=7)return '<span class="urgency-dot" style="background:#3b82f6" title="Soon"></span>';
  return '<span class="urgency-dot" style="background:#3a3d4e"></span>';
}

function dueDiff(due){
  const d=new Date(due+'T00:00:00'),t=new Date();t.setHours(0,0,0,0);
  return Math.round((d-t)/86400000);
}

function urgencyBadge(due){
  if(!due)return '';
  const diff=dueDiff(due);
  if(diff<0)return '<span class="badge badge-overdue">OVERDUE</span>';
  if(diff===0)return '<span class="badge badge-today">TODAY</span>';
  if(diff===1)return '<span class="badge badge-tomorrow">TOMORROW</span>';
  return '';
}

async function loadManageItems(){
  try{
    const r=await fetch('/api/items?include_completed='+(mgShowCompleted?'1':'0'));
    const d=await r.json();
    mgAllItems=d.items||[];
    renderSubtabs();
    renderItemList();
  }catch(e){
    document.getElementById('items-list').innerHTML='<div style="color:#ff9aa2;padding:20px">Failed to load items: '+escHtml(e.message)+'</div>';
  }
}

function renderSubtabs(){
  const children=[...new Set(mgAllItems.map(i=>i.child))].sort();
  const dl=document.getElementById('children-list');
  if(dl) dl.innerHTML=children.map(c=>'<option value="'+escHtml(c)+'">').join('');
}

function renderEmailActions(){
  const list=document.getElementById('email-actions-list');
  if(!list) return;
  const items=dashData.email_items;
  if(!items||!items.length){
    list.innerHTML='<div class="dash-empty">No email action items.</div>';
    return;
  }
  list.innerHTML=items.slice().sort((a,b)=>{
    if(a.due_iso&&b.due_iso) return a.due_iso.localeCompare(b.due_iso);
    if(a.due_iso) return -1;
    if(b.due_iso) return 1;
    return 0;
  }).map(i=>{
    const diff=dashDiff(i.due_iso);
    const gmailUrl=i.id?'https://mail.google.com/mail/u/0/#all/'+encodeURIComponent(i.id):'https://mail.google.com/mail/u/0/';
    return '<div class="email-action-item">'+
      '<span class="dash-dot" style="background:'+dashDot(diff)+';margin-top:6px;flex-shrink:0"></span>'+
      '<div class="ea-body">'+
        '<div class="ea-summary">'+escHtml(i.summary)+'</div>'+
        '<div class="ea-meta">'+
          (i.due_iso?dashDueLabel(i.due_iso):'')+
          (i.child?'<span class="dash-child">'+escHtml(i.child)+'</span>':'')+
          '<a class="ea-link" href="'+gmailUrl+'" target="_blank" rel="noopener">Open in Gmail ↗</a>'+
        '</div>'+
      '</div></div>';
  }).join('');
}

function renderItemList(){
  const list=document.getElementById('items-list');
  const active=mgAllItems.filter(i=>!i.completed);
  const done=mgAllItems.filter(i=>i.completed);
  if(!mgAllItems.length){
    list.innerHTML='<div class="items-empty">No reminders yet.<br>Click <strong>+ Add</strong> to get started.</div>';
    return;
  }
  list.innerHTML=active.map(itemRow).join('')+
    (done.length?'<div class="show-completed" onclick="toggleCompleted()">'+(mgShowCompleted?'Hide completed ('+done.length+')':'Show completed ('+done.length+')')+'</div>':'')+
    (mgShowCompleted?done.map(completedRow).join(''):'');
}

function itemRow(item){
  const notes=item.notes?'<div class="item-notes">'+escHtml(item.notes)+'</div>':'';
  const due=item.due_date?item.due_date.slice(0,10):'';
  const meta='<div class="item-meta">'+escHtml(item.child)+(due?' · '+due:'')+' · '+escHtml(item.type||item.source)+'</div>';
  return '<div class="item-card">'+
    urgencyDot(item.due_date)+
    '<div class="item-body"><div class="item-title">'+escHtml(item.title)+urgencyBadge(item.due_date)+'</div>'+meta+notes+'</div>'+
    '<div class="item-actions">'+
    '<button class="btn-done" onclick="doneItem('+item.id+')">✓ Done</button>'+
    '<button class="btn-edit" onclick="editItem('+item.id+')" title="Edit">✎</button>'+
    '</div></div>';
}

function completedRow(item){
  return '<div class="completed-row">'+
    '<span class="urgency-dot" style="background:#3a3d4e"></span>'+
    '<div class="item-body"><div class="item-title" style="text-decoration:line-through;color:#b0bace">'+escHtml(item.title)+'</div>'+
    '<div class="item-meta">'+escHtml(item.child)+' · Completed</div></div>'+
    '<span class="badge badge-done">DONE</span></div>';
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// Mark-complete via localStorage
function _doneKey(src,child,title){return 'done:'+src+':'+child+':'+title;}
function isDone(src,child,title){return localStorage.getItem(_doneKey(src,child,title))==='1';}
function toggleDone(src,child,title){
  const k=_doneKey(src,child,title);
  if(localStorage.getItem(k)==='1') localStorage.removeItem(k); else localStorage.setItem(k,'1');
  renderDashList();
}

function setChild(btn,child){
  mgActiveChild=child;
  renderSubtabs();
  renderItemList();
}

function toggleCompleted(){mgShowCompleted=!mgShowCompleted;loadManageItems();}

function toggleAddForm(){
  const f=document.getElementById('add-form');
  const showing=f.style.display==='flex';
  if(showing){cancelAddForm();}
  else{
    f.style.display='flex';
    document.getElementById('form-header-label').textContent='Add Item';
    document.getElementById('f-editing-id').value='';
    document.getElementById('f-title').value='';
    document.getElementById('f-child').value='';
    document.getElementById('f-type').value='assignment';
    document.getElementById('f-due').value='';
    document.getElementById('f-notes').value='';
    document.getElementById('f-title').focus();
  }
}

function cancelAddForm(){
  document.getElementById('add-form').style.display='none';
  document.getElementById('f-editing-id').value='';
}

function editItem(id){
  const item=mgAllItems.find(i=>i.id===id);
  if(!item)return;
  const f=document.getElementById('add-form');
  f.style.display='flex';
  document.getElementById('form-header-label').textContent='Edit Item';
  document.getElementById('f-editing-id').value=id;
  document.getElementById('f-title').value=item.title||'';
  document.getElementById('f-child').value=item.child||'';
  document.getElementById('f-type').value=item.type||'assignment';
  document.getElementById('f-due').value=(item.due_date||'').slice(0,10);
  document.getElementById('f-notes').value=item.notes||'';
  document.getElementById('f-title').focus();
}

async function doneItem(id){
  try{
    const r=await fetch('/api/items/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({completed:true})});
    if(!r.ok)throw new Error('Server error '+r.status);
    await loadManageItems();
  }catch(e){
    document.getElementById('items-list').innerHTML='<div style="color:#ff9aa2;padding:20px">Failed to mark done: '+escHtml(e.message)+'</div>';
  }
}

async function submitItem(e){
  e.preventDefault();
  const editingId=document.getElementById('f-editing-id').value;
  const payload={
    child:document.getElementById('f-child').value,
    title:document.getElementById('f-title').value.trim(),
    type:document.getElementById('f-type').value,
    due_date:document.getElementById('f-due').value||null,
    notes:document.getElementById('f-notes').value.trim()||null,
  };
  if(!payload.child||!payload.title)return;
  try{
    let r;
    if(editingId){
      r=await fetch('/api/items/'+editingId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }else{
      r=await fetch('/api/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    }
    if(!r.ok)throw new Error('Server error '+r.status);
    cancelAddForm();
    await loadManageItems();
  }catch(e){
    document.getElementById('items-list').innerHTML='<div style="color:#ff9aa2;padding:20px">Failed to save: '+escHtml(e.message)+'</div>';
  }
}

// Wire up tab activation
document.querySelectorAll('.tabbar button').forEach(btn=>{
  btn.addEventListener('click',()=>{if(btn.dataset.tab==='manage')loadManageItems();});
});
// ── End Manage tab ───────────────────────────────────────────
</script>
</body>
</html>
